version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trade-tariff-web
    ports:
      - "8080:8080"  # exposed to Preevy
    environment:
      RAILS_ENV: development
      GOVUK_APP_DOMAIN: localhost
      GOVUK_WEBSITE_ROOT: http://localhost/
      DATABASE_URL: postgres://postgres:postgres@hmrc-postgres:5432/postgres
      REDIS_URL: redis://redis:6379/0
      OPENSEARCH_URL: http://hmrc-opensearch:9200
    depends_on:
      - redis
      - hmrc-postgres
      - hmrc-opensearch

  redis:
    image: redis
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - dev-env-redis-volume:/data

  hmrc-postgres:
    image: postgres:13
    container_name: postgres
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      LANG: C.UTF-8
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - hmrc-postgres13:/var/lib/postgresql/data

  hmrc-opensearch:
    image: opensearchproject/opensearch:2
    container_name: hmrc-opensearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - bootstrap.memory_lock=true
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms500m -Xmx500m
      - cluster.routing.allocation.disk.threshold_enabled=false
      - plugins.security.disabled=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - hmrc-os:/usr/share/opensearch/data
      - ./config/opensearch/synonyms_all.txt:/usr/share/opensearch/config/synonyms_all.txt:z
      - ./config/opensearch/stemming_exclusions_all.txt:/usr/share/opensearch/config/stemming_exclusions_all.txt:z
    healthcheck:
      interval: 60s
      retries: 10
      test: curl -s http://localhost:9200/_cluster/health | grep -vq '"status":"red"'

volumes:
  dev-env-redis-volume:
  hmrc-postgres13:
  hmrc-os:
