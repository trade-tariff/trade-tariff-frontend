name: Auto-merge low-risk PRs

on:
  pull_request:
    types:
      - ready_for_review
      - labeled
      - unlabeled
  pull_request_review:
    types:
      - submitted
  workflow_run:
    workflows:
      - 'ci'
    types:
      - completed


permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: >-
      (
        github.event_name != 'pull_request' ||
        !github.event.pull_request.draft
      ) &&
      (
        github.event_name != 'pull_request_review' ||
        github.event.review.user.login == 'copilot-pull-request-reviewer[bot]'
      )
    uses: trade-tariff/trade-tariff-tools/.github/workflows/auto-merge-low-risk.yml@main
    with:
      label: low-risk
      merge-method: rebase
    secrets:
      github-token: ${{ secrets.PULL_REQUEST_PAT }}
