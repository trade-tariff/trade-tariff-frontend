name: Preview App Up
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  AWS_REGION: eu-west-2
  IAM_ROLE_ARN: arn:aws:iam::844815912454:role/GithubActions-Preview-App-Role
  PREEVY_PROFILE_URL: s3://preevy-profile-store?region=eu-west-2
  ENVIRONMENT: development
  SECRET_NAME: frontend-configuration

# allow a single job to run per PR
concurrency: preevy-${{ github.event.number }}

jobs:
  deploy:
    if: contains(github.event.pull_request.labels.*.name, 'needs-preview')
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/checkout@v4

      - name: Fetch frontend-configuration secrets and mask values
        run: |
          set -euo pipefail

          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "${{ env.SECRET_NAME }}" \
            --query "SecretString" \
            --output text)

          echo "$SECRET_JSON" | jq -r 'to_entries[] | "::add-mask::\(.value)"'
          echo "$SECRET_JSON" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> .env

      - uses: livecycle/preevy-up-action@v2.4.0
        id: preevy_up
        with:
          install: gh-release
          profile-url: "${{ env.PREEVY_PROFILE_URL }}"
        env:
          GITHUB_TOKEN: ${{ github.token }}
          BUILDX_BAKE_ENTITLEMENTS_FS: 0

  sanity-check:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g preevy

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Pin Docker Compose to v2.35.0 manually
        run: |
          mkdir -p ~/.docker/cli-plugins/
          curl -sSL https://github.com/docker/compose/releases/download/v2.35.0/docker-compose-linux-x86_64 -o ~/.docker/cli-plugins/docker-compose
          chmod +x ~/.docker/cli-plugins/docker-compose

      - name: Debug
        run: |
          docker compose"" version
          preevy urls --profile "${{ env.PREEVY_PROFILE_URL }}"
      - name: Extract preview URL
        run: |
          echo "🔍 Fetching URL from preevy profile..."
          PREVIEW_URL=$(preevy urls --json --wait --profile "${{ env.PREEVY_PROFILE_URL }}" | jq -r '.[].url')
          echo "🌐 Preview URL: $PREVIEW_URL"
          echo "PREVIEW_URL=$PREVIEW_URL" >> $GITHUB_ENV

      - name: Wait for app to be ready
        run: |
          echo "⏳ Waiting for app to start (max 60s)..."
          timeout 60 bash -c '
            until curl -s -f -o /dev/null "$PREVIEW_URL"; do
              sleep 5
              echo "Retrying..."
            done
          ' || {
            echo "❌ App did not start in time"
            exit 1
          }

      - name: Run sanity checks
        run: |
          echo "⚙️ Checking HTTP 200 status..."
          curl -s -o /dev/null -w "%{http_code}" "$PREVIEW_URL" | grep -q 200 || {
            echo "❌ Homepage did not return 200"
            exit 1
          }

          echo "🔎 Checking content..."
          curl -s "$PREVIEW_URL" | grep -q "UK Integrated Online Tariff" || {
            echo "❌ Expected text not found"
            exit 1
          }

          echo "📦 Checking CSS asset..."
          curl -I "$PREVIEW_URL/assets/application.css" | grep -q "200 OK" || {
            echo "❌ CSS asset failed to load"
            exit 1
          }

          echo "✅ All checks passed!"
