name: Preview App Up
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  AWS_REGION: eu-west-2
  IAM_ROLE_ARN: arn:aws:iam::844815912454:role/GithubActions-Preview-App-Role
  PREEVY_PROFILE_URL: s3://preevy-profile-store?region=eu-west-2
  ENVIRONMENT: development
  SECRET_NAME: frontend-configuration

# allow a single job to run per PR
concurrency: preevy-${{ github.event.number }}

jobs:
  deploy:
    if: contains(github.event.pull_request.labels.*.name, 'needs-preview')
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/checkout@v4

      - name: Fetch frontend-configuration secrets and mask values
        run: |
          set -euo pipefail

          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "${{ env.SECRET_NAME }}" \
            --query "SecretString" \
            --output text)

          echo "$SECRET_JSON" | jq -r 'to_entries[] | "::add-mask::\(.value)"'
          echo "$SECRET_JSON" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> .env

      - uses: livecycle/preevy-up-action@v2.4.0
        id: preevy_up
        with:
          install: gh-release
          profile-url: "${{ env.PREEVY_PROFILE_URL }}"
        env:
          GITHUB_TOKEN: ${{ github.token }}
          BUILDX_BAKE_ENTITLEMENTS_FS: 0

  sanity-check:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: touch .env
      - run: npm install -g preevy

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Pin Docker Compose to v2.36.0 manually
        run: |
          mkdir -p ~/.docker/cli-plugins/
          curl -sSL https://github.com/docker/compose/releases/download/v2.36.0/docker-compose-linux-x86_64 -o ~/.docker/cli-plugins/docker-compose
          chmod +x ~/.docker/cli-plugins/docker-compose
          docker compose version
      - name: Debug
        run: |
          echo "ℹ️ Listing Preevy environments:"
          preevy ls --profile "${{ env.PREEVY_PROFILE_URL }}" --json | jq .
          echo "ℹ️ Raw URLs output:"
          preevy urls --json --profile "${{ env.PREEVY_PROFILE_URL }}" | jq .

      - name: Extract preview URL
        run: |
          echo "🔍 Fetching URL from preevy profile..."
          # Retry up to 3 times to get URL
          for i in {1..3}; do
            PREVIEW_URL=$(preevy urls --json --wait --profile "${{ env.PREEVY_PROFILE_URL }}" | jq -r '.[].url')
            if [[ -n "$PREVIEW_URL" ]]; then
              echo "🌐 Preview URL: $PREVIEW_URL"
              echo "PREVIEW_URL=$PREVIEW_URL" >> $GITHUB_ENV
              break
            fi
            echo "⚠️ Attempt $i/3 failed, retrying in 5s..."
            sleep 5
          done

          if [[ -z "$PREVIEW_URL" ]]; then
            echo "❌ Failed to get preview URL after 3 attempts"
            exit 1
          fi

      - name: Wait for App to Be Ready
        run: |
          echo "⏳ Waiting for app to respond (max 120 seconds)..."
          for i in {1..24}; do  # 24 attempts * 5s = 120s max
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$PREVIEW_URL" || true)
            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "✅ App responded with HTTP 200"
              break
            fi
            echo "⏱️ Attempt $i/24: Got HTTP $HTTP_CODE, retrying in 5s..."
            sleep 5
          done
          
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "❌ App did not return HTTP 200 after 120s"
            exit 1
          fi

      - name: Run Sanity Checks
        run: |
          echo "🔍 Running sanity checks..."
          
          # Check homepage
          echo "1️⃣ Checking homepage content..."
          curl --retry 3 --retry-delay 5 -s "$PREVIEW_URL" | grep -q "UK Integrated Online Tariff" || {
            echo "❌ Homepage content check failed"
            exit 1
          }
          
          # Check CSS asset
          echo "2️⃣ Checking CSS asset..."
          curl --retry 3 --retry-delay 5 -I "$PREVIEW_URL/assets/application.css" | grep -q "200 OK" || {
            echo "❌ CSS asset check failed"
            exit 1
          }
          
          # Check JavaScript asset (if needed)
          echo "3️⃣ Checking JS asset..."
          curl --retry 3 --retry-delay 5 -I "$PREVIEW_URL/assets/application.js" | grep -q "200 OK" || {
            echo "❌ JS asset check failed"
            exit 1
          }
          
          echo "✅ All sanity checks passed!"
