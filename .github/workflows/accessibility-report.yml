name: Accessibility Report

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - run: npm ci

      - name: Run accessibility tests
        run: npx playwright test

      - name: Deploy report to GitHub Pages
        run: npm run deploy-report

      - name: Share link (optional)
        run: echo "Report available at https://<your-username>.github.io/<repo-name>/accessibility-report.html"
